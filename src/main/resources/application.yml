spring:
  application:
    name: spring-batch
  datasource:
    username: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5431/postgres?charSet=UTF-8
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.jdbc: ERROR
    org.springframework.batch: debug
